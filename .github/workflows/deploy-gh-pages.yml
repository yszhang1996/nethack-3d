name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        id: checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fallback checkout via tarball
        if: steps.checkout.outcome != 'success'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "actions/checkout failed; downloading source tarball for ${GITHUB_SHA}"
          temp_dir="$(mktemp -d)"
          archive_path="${temp_dir}/repo.tar.gz"
          curl -fL \
            --retry 6 \
            --retry-all-errors \
            --retry-delay 5 \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/tarball/${GITHUB_SHA}" \
            -o "${archive_path}"
          tar -xzf "${archive_path}" -C "${temp_dir}"
          src_dir="$(find "${temp_dir}" -mindepth 1 -maxdepth 1 -type d | head -n1)"
          rm -rf "${GITHUB_WORKSPACE:?}/"*
          cp -a "${src_dir}/." "${GITHUB_WORKSPACE}/"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check glyph catalog
        run: npm run glyphs:check

      - name: Build
        run: npm run build

      - name: Disable Jekyll
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
