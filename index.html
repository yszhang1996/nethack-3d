<!-- index.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile/PWA: prevent input-focus zoom + allow fullscreen standalone app -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000011" />

    <!-- Android / Chrome -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="NetHack 3D" />

    <!-- iOS / Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="NetHack 3D" />
    <meta name="format-detection" content="telephone=no" />

    <link rel="manifest" href="manifest.webmanifest" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="icons/icon-192.png"
    />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />

    <title>NetHack 3D</title>
  </head>
  <body>
    <div id="root"></div>

    <!-- Best-effort address bar minimization when running in-browser (standalone/PWA hides it) -->
    <script>
      (function () {
        function nudgeScroll() {
          // Allow the browser to render first, then nudge.
          setTimeout(function () {
            try {
              window.scrollTo(0, 1);
            } catch {}
          }, 50);
        }
        window.addEventListener("load", nudgeScroll, { passive: true });
        window.addEventListener("orientationchange", nudgeScroll, {
          passive: true,
        });
      })();
    </script>

    <script src="/src/main.tsx" type="module"></script>
  </body>
</html>
