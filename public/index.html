<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetHack 3D</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="loading" id="loading">
      <div>NetHack 3D</div>
      <div class="loading-subtitle">
        Starting local runtime...
      </div>
    </div>

    <div class="top-left-ui">
      <div id="game-status">Starting NetHack...</div>
      <div id="game-log"></div>
    </div>

    <div class="question-ui" id="question-ui">
      <div class="question-text" id="question-text"></div>
      <div class="question-options" id="question-options"></div>
    </div>

    <div class="controls">
      <div><strong>Controls:</strong></div>
      <div>Arrow Keys: Move</div>
      <div>Space: Wait</div>
      <div>Enter: Confirm</div>
      <div>Esc: Cancel/Menu</div>
    </div>

    <!-- Import map for development -->
    <script type="importmap">
      {
        "imports": {
          "three": "./three.module.js"
        }
      }
    </script>

    <!-- 
      Load our compiled application code. It's a module, so it can use 
      import/export syntax. It starts a local NetHack WASM runtime in-browser.
    -->
    <script type="module" src="app.js"></script>
  </body>
</html>
